# Receipt — local dev stack (fiscal-core + Postgres)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: receipt
      POSTGRES_PASSWORD: receipt
      POSTGRES_DB: receipt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipt"]
      interval: 5s
      timeout: 3s
      retries: 10

  fiscal-core:
    build: ./fiscal-core
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV: sandbox
      LOG_LEVEL: info
      SECRETS_BACKEND: env
      DATABASE_URL: postgresql+psycopg://receipt:receipt@db:5432/receipt
    env_file:
      - ./fiscal-core/.env
    ports:
      - "8000:8000"
    volumes:
      - ./fiscal-core/secrets:/app/secrets:ro

volumes:
  pgdata:
